# This is a Github Workflow that runs tests on any push or pull request.
# If the tests pass and this is a push to the master branch it also runs Semantic Release.
name: CI
on: [push, pull_request]

permissions: {}

jobs:
  push:
    name: Push ${{ github.ref }}
    if: github.event_name == 'push'
    runs-on: ubuntu-24.04
    permissions:
      checks: read
      statuses: write
      contents: write
      packages: write
      id-token: write
    steps:
      - name: Fetch depth
        env:
          COMMITS_JSON: ${{ toJSON(github.event.commits) }}
        run: echo "FETCH_DEPTH=$(echo "$COMMITS_JSON" | jq 'length | if . < 20 then . + 1 else 0 end')" >> $GITHUB_ENV

      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: ${{ env.FETCH_DEPTH }}

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: 'yarn'

      - name: Setup Bun Runtime
        uses: antongolub/action-setup-bun@38d526c08108ece77f46bf61e78988c7fc0ce5ab # v1.9.1

      - uses: denoland/setup-deno@667a34cdef165d8d2b2e98dde39547c9daac7282 # v2.0.4
        with:
          deno-version: v1.x

      - name: Fetch deps
        run: yarn --silent --immutable

      - name: Recover incomplete releases
        if: github.ref == 'refs/heads/master'
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: npx zx-bulk-release --recover

      - name: Build
        run: |
          yarn warmup
          yarn build
        env:
          VERBOSE: true

      - name: Coverage
        run: yarn cov
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Qlty.sh (codeclimate)
        uses: qltysh/qlty-action/coverage@a19242102d17e497f437d7466aa01b528537e899 # v2.2.0
        with:
          token: ${{ secrets.QLTY_TOKEN }}
          files: ${{github.workspace}}/lcov.info

      - name: Semantic Release
        if: github.ref == 'refs/heads/master'
        env:
          NPM_OIDC: true
          GH_USER: ${{ secrets.GH_USER }}
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          GIT_AUTHOR_NAME: ${{ secrets.GIT_AUTHOR_NAME }}
          GIT_AUTHOR_EMAIL: ${{ secrets.GIT_AUTHOR_EMAIL }}
          GIT_COMMITTER_NAME: ${{ secrets.GIT_COMMITTER_NAME }}
          GIT_COMMITTER_EMAIL: ${{ secrets.GIT_COMMITTER_EMAIL }}
        run: npm_config_yes=true npx zx-bulk-release --no-build

  pr:
    if: github.event_name == 'pull_request'
    name: PR
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    steps:
      # https://github.com/actions/checkout/issues/552
      - name: Fetch depth
        env:
          PR_COMMITS: ${{ github.event.pull_request.commits }}
        run: echo "PR_FETCH_DEPTH=$(( PR_COMMITS + 1 ))" >> "${GITHUB_ENV}"

      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: ${{ env.PR_FETCH_DEPTH }}
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: 'yarn'

      - name: Setup Bun Runtime
        uses: antongolub/action-setup-bun@38d526c08108ece77f46bf61e78988c7fc0ce5ab # v1.9.1

      - name: Setup Deno
        uses: denoland/setup-deno@667a34cdef165d8d2b2e98dde39547c9daac7282 # v2.0.4
        with:
          deno-version: v1.x

      - name: Fetch deps
        run: yarn --silent --immutable

      - name: Build
        run: |
          yarn warmup
          yarn build

      - name: Save artifacts
        uses: actions/upload-artifact@v7
        with:
          name: target
          path: |
            package.json
            packages/**/target/esm/**/*
            packages/**/target/cjs/**/*
            packages/**/target/dts/**/*
            packages/**/target/coverage/lcov.info

  pr-compat:
    needs: pr
    name: Compat test (Node v${{ matrix.node-version }}, OS ${{ matrix.os }})
    permissions:
      contents: read
    strategy:
      matrix:
        os: [ ubuntu-24.04, windows-latest ]
        node-version: [ 18, 20 ]

    runs-on: ${{ matrix.os }}

    steps:
      # https://github.com/actions/checkout/issues/552
      - name: Fetch depth
        env:
          PR_COMMITS: ${{ github.event.pull_request.commits }}
        run: |
          echo "PR_FETCH_DEPTH=$(( $env:PR_COMMITS + 1 ))" >> $env:GITHUB_ENV
          echo "PR_FETCH_DEPTH=$(( PR_COMMITS + 1 ))" >> "${GITHUB_ENV}"

      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: ${{ env.PR_FETCH_DEPTH }}
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'yarn'

      - name: Download artifacts
        uses: actions/download-artifact@v8
        with:
          name: target

      - name: Fetch deps
        run: yarn --silent --immutable

      - name: Integration test
        run: yarn test --testCmd="yarn test:it"
